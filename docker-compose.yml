services:
  db:
    image: postgres:15
    container_name: etl_postgres
    environment:
      POSTGRES_USER: devjoint_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: etl_database
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: etl_app
    depends_on:
      - db
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/etl_database