version: '3.8'

services:
  postgres_db:
    image: postgres:15
    container_name: etl_postgres
    environment:
      POSTGRES_USER: devjoint_user
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: etl_database
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata: